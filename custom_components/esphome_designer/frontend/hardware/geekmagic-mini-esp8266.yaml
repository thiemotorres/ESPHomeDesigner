# ============================================================================
# ESPHome YAML - Generated by ESPHome Designer
# ============================================================================
# TARGET DEVICE: GeekMagic Mini (ESP8266 / ST7789V)
# Name: GeekMagic Mini (ESP8266)
# Resolution: 240x240
# Shape: rect
# Inverted: false
# Orientation: landscape
# Refresh Interval: 60
# ============================================================================
#
# BASED ON: https://github.com/koosoli/ESPHomeDesigner/issues/142
# Hardware: GeekMagic Smart Display (ESP8266 variant), ST7789V 240x240 SPI panel.
#
# Pin layout (from issue #142):
#   SPI CLK : GPIO14
#   SPI MOSI: GPIO13
#   DC      : GPIO00
#   RESET   : GPIO02
#   Backlight (PWM, active-low): GPIO05
#
# ESPHome >= 2025.5 is required for the mipi_spi platform with model ST7789V,
# which replaces the older external_components-based st7789v setup.
#
# ============================================================================

esphome:
  min_version: 2025.5.0

esp8266:
  board: esp01_1m

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  interface: hardware
  id: spihwd

# NOTE: display: must precede output:/light: — hardware_profile_sources.js:143
# matches the first `- platform:` line in the file to derive displayPlatform.
# Reordering would silently make it resolve to esp8266_pwm.
display:
  - platform: mipi_spi
    id: my_display
    model: ST7789V
    spi_id: spihwd
    dimensions:
      height: 240
      width: 240
      offset_height: 0
      offset_width: 0
    buffer_size: 12.5%
    color_depth: 16
    invert_colors: true
    dc_pin: GPIO00
    reset_pin: GPIO02
    spi_mode: mode3
    data_rate: 40000000
    auto_clear_enabled: false
    update_interval: 60s
    # __LAMBDA_PLACEHOLDER__

output:
  - platform: esp8266_pwm
    pin: GPIO05
    frequency: 1000 Hz
    id: backlight_pwm
    inverted: true

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Backlight"
    id: backlight
    restore_mode: ALWAYS_ON
